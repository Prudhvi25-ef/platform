name: Platform CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io/prudhvi25-ef
  IMAGE_NAME: backend
  ENV_FILE: environments/dev/values.yaml

jobs:

  ci:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ steps.version.outputs.VERSION }} apps/backend

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}

  cd:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u prudhvi25-ef --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ needs.ci.outputs.version }} apps/backend

      - name: Push Image
        run: |
          docker push $REGISTRY/$IMAGE_NAME:${{ needs.ci.outputs.version }}

      - name: Update Helm values.yaml
        run: |
          sed -i "s/tag:.*/tag: ${{ needs.ci.outputs.version }}/" $ENV_FILE

      - name: Commit Changes
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@platform.com"
          git add .
          git commit -m "update image tag to ${{ needs.ci.outputs.version }}" || echo "No changes"
          git push
